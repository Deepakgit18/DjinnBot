name: Build Dialogue macOS App

on:
  push:
    tags: ["app-v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: read

env:
  PROJECT_DIR: apps/macos/Dialogue
  SCHEME: Dialogue
  ARCHIVE_PATH: apps/macos/Dialogue/build/Dialogue.xcarchive
  EXPORT_PATH: apps/macos/Dialogue/build/export
  SPM_CACHE_DIR: spm-cache

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: xcodebuild -version

      - name: Install certificate and provisioning profile
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the Developer ID certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH=$RUNNER_TEMP/dialogue.provisionprofile
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".provisionprofile
          rm "$PROFILE_PATH"
          echo "Installed provisioning profile: $UUID"

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.SPM_CACHE_DIR }}
          key: spm-${{ runner.os }}-${{ hashFiles('apps/macos/Dialogue/Dialogue.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_DIR/Dialogue.xcodeproj" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$SPM_CACHE_DIR"

      # Extract version from tag (e.g. app-v1.2.3 -> 1.2.3)
      # The version is baked into the app bundle so "About Dialogue" shows it.
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#app-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION (build ${{ github.run_id }})"

      # The project has per-target signing: Release config uses Manual with
      # Developer ID + provisioning profile. SPM targets stay Automatic.
      - name: Archive
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcodebuild archive \
            -project "$PROJECT_DIR/Dialogue.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$SPM_CACHE_DIR" \
            ARCHS=arm64 \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_id }}" \
            | xcbeautify || true

          test -d "$ARCHIVE_PATH" || { echo "error: Archive failed"; exit 1; }

      - name: Copy signed app from archive
        run: |
          mkdir -p "$EXPORT_PATH"
          cp -R "$ARCHIVE_PATH/Products/Applications/Dialogue.app" "$EXPORT_PATH/Dialogue.app"
          codesign --verify --deep --strict "$EXPORT_PATH/Dialogue.app"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: 8H548FVL95
        run: |
          ditto -c -k --keepParent "$EXPORT_PATH/Dialogue.app" "$RUNNER_TEMP/Dialogue-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/Dialogue-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m

          xcrun stapler staple "$EXPORT_PATH/Dialogue.app"

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          brew install create-dmg

          DMG_NAME="Dialogue-${APP_VERSION}.dmg"

          # create-dmg returns exit code 2 if it can't set the custom icon — still valid
          create-dmg \
            --volname "Dialogue" \
            --volicon "$EXPORT_PATH/Dialogue.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "Dialogue.app" 180 190 \
            --hide-extension "Dialogue.app" \
            --app-drop-link 480 190 \
            --no-internet-enable \
            "$EXPORT_PATH/$DMG_NAME" \
            "$EXPORT_PATH/Dialogue.app" \
          || test $? -eq 2

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: 8H548FVL95
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_PATH="$EXPORT_PATH/Dialogue-${APP_VERSION}.dmg"

          codesign --force --sign "Developer ID Application: Michael Moore (8H548FVL95)" \
            --timestamp "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m

          xcrun stapler staple "$DMG_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dialogue-${{ github.ref_name }}
          path: ${{ env.EXPORT_PATH }}/Dialogue-*.dmg
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
